build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

complexity:
  LongMethod:
    threshold: 60
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
    excludes: ['**/test/**', '**/androidTest/**']
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 15
    thresholdInObjects: 15
  CyclomaticComplexMethod:
    threshold: 16

naming:
  FunctionNaming:
    functionPattern: '[a-zA-Z][a-zA-Z0-9]*'
    excludes: ['**/test/**', '**/androidTest/**']
  MatchingDeclarationName:
    active: false

style:
  MagicNumber:
    active: false
  ReturnCount:
    max: 5
  MaxLineLength:
    maxLineLength: 140
  UnusedPrivateMember:
    active: true
    ignoreAnnotated:
      - 'androidx.compose.ui.tooling.preview.Preview'
      - 'Preview'
  WildcardImport:
    excludes: ['**/test/**', '**/androidTest/**']

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true

comments:
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false
  UndocumentedPublicProperty:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    ignoredExceptionTypes:
      - ActivityNotFoundException
      - InterruptedException
      - NumberFormatException
      - ParseException

potential-bugs:
  UnsafeCallOnNullableType:
    active: true
